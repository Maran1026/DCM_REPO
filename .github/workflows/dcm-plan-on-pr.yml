name: DCM Plan on PR

on:
  pull_request:
    branches: [main]
    paths:
      - 'manifest.yml'
      - 'sources/**'

permissions:
  id-token: write
  contents: read
  pull-requests: write

jobs:
  plan-test:
    name: Plan TEST (SVC_GITHUB_DCM_TEST)
    runs-on: ubuntu-latest
    environment: DCM_TEST
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Snowflake CLI
        uses: Snowflake-Labs/snowflake-cli-action@v1.5
        with:
          cli-version: 'latest'

      - name: Configure Snowflake Connection
        env:
          SNOWFLAKE_ACCOUNT: ${{ vars.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_USER: ${{ vars.SNOWFLAKE_USER }}
          SNOWFLAKE_PRIVATE_KEY: ${{ secrets.SNOWFLAKE_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.snowflake
          cat > ~/.snowflake/config.toml << 'TOML'
          [connections.dcm_test]
          account = "${SNOWFLAKE_ACCOUNT}"
          user = "${SNOWFLAKE_USER}"
          role = "DCM_TEST_DEPLOYER"
          warehouse = "SNOWFLAKE_INTELLIGENCE_WH"
          authenticator = "SNOWFLAKE_JWT"
          TOML
          # Replace placeholders with actual values
          sed -i "s/\${SNOWFLAKE_ACCOUNT}/$SNOWFLAKE_ACCOUNT/" ~/.snowflake/config.toml
          sed -i "s/\${SNOWFLAKE_USER}/$SNOWFLAKE_USER/" ~/.snowflake/config.toml
          # Write private key to file
          echo "$SNOWFLAKE_PRIVATE_KEY" > ~/.snowflake/dcm_test_key.p8
          chmod 600 ~/.snowflake/dcm_test_key.p8
          # Add private key path to config
          echo 'private_key_file = "~/.snowflake/dcm_test_key.p8"' >> ~/.snowflake/config.toml
          chmod 600 ~/.snowflake/config.toml

      - name: Verify Connection
        run: snow connection test -c dcm_test

      - name: Run DCM Plan for TEST
        run: snow dcm plan --target TEST --save-output -c dcm_test

      - name: Upload Plan Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dcm-plan-test
          path: out/plan/

      - name: Comment Plan Summary on PR
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let summary = '### DCM Plan - TEST\n\n';
            try {
              const plan = JSON.parse(fs.readFileSync('out/plan/plan_result.json', 'utf8'));
              const changes = plan.changeset || [];
              const creates = changes.filter(c => c.type === 'CREATE').length;
              const alters = changes.filter(c => c.type === 'ALTER').length;
              const drops = changes.filter(c => c.type === 'DROP').length;
              summary += `| Action | Count |\n|---|---|\n`;
              summary += `| CREATE | ${creates} |\n| ALTER | ${alters} |\n| DROP | ${drops} |\n\n`;
              if (drops > 0) summary += '⚠️ **Warning: DROP operations detected!**\n';
              else summary += '✅ No destructive changes.\n';
            } catch (e) {
              summary += '❌ Plan failed or output not found.\n';
            }
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: summary
            });

  plan-prod:
    name: Plan PROD (SVC_GITHUB_DCM_PROD)
    runs-on: ubuntu-latest
    environment: DCM_PROD
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Snowflake CLI
        uses: Snowflake-Labs/snowflake-cli-action@v1.5
        with:
          cli-version: 'latest'

      - name: Configure Snowflake Connection
        env:
          SNOWFLAKE_ACCOUNT: ${{ vars.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_USER: ${{ vars.SNOWFLAKE_USER }}
          SNOWFLAKE_PRIVATE_KEY: ${{ secrets.SNOWFLAKE_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.snowflake
          cat > ~/.snowflake/config.toml << 'TOML'
          [connections.dcm_prod]
          account = "${SNOWFLAKE_ACCOUNT}"
          user = "${SNOWFLAKE_USER}"
          role = "DCM_PROD_DEPLOYER"
          warehouse = "SNOWFLAKE_INTELLIGENCE_WH"
          authenticator = "SNOWFLAKE_JWT"
          TOML
          sed -i "s/\${SNOWFLAKE_ACCOUNT}/$SNOWFLAKE_ACCOUNT/" ~/.snowflake/config.toml
          sed -i "s/\${SNOWFLAKE_USER}/$SNOWFLAKE_USER/" ~/.snowflake/config.toml
          echo "$SNOWFLAKE_PRIVATE_KEY" > ~/.snowflake/dcm_prod_key.p8
          chmod 600 ~/.snowflake/dcm_prod_key.p8
          echo 'private_key_file = "~/.snowflake/dcm_prod_key.p8"' >> ~/.snowflake/config.toml
          chmod 600 ~/.snowflake/config.toml

      - name: Verify Connection
        run: snow connection test -c dcm_prod

      - name: Run DCM Plan for PROD
        run: snow dcm plan --target PROD --save-output -c dcm_prod

      - name: Upload Plan Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dcm-plan-prod
          path: out/plan/

      - name: Comment Plan Summary on PR
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let summary = '### DCM Plan - PROD\n\n';
            try {
              const plan = JSON.parse(fs.readFileSync('out/plan/plan_result.json', 'utf8'));
              const changes = plan.changeset || [];
              const creates = changes.filter(c => c.type === 'CREATE').length;
              const alters = changes.filter(c => c.type === 'ALTER').length;
              const drops = changes.filter(c => c.type === 'DROP').length;
              summary += `| Action | Count |\n|---|---|\n`;
              summary += `| CREATE | ${creates} |\n| ALTER | ${alters} |\n| DROP | ${drops} |\n\n`;
              if (drops > 0) summary += '⚠️ **Warning: DROP operations detected!**\n';
              else summary += '✅ No destructive changes.\n';
            } catch (e) {
              summary += '❌ Plan failed or output not found.\n';
            }
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: summary
            });
